<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{.ProxyPrefix}}/static/css/bulma.min.css">
    <style>
        body {
            background-color: #f7f7f7;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        .login-container h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }
        .logo {
            margin: 2rem 0;
        }
        .logo img {
            max-width: 120px;
            margin: 0 auto;
        }
        .field {
            margin-bottom: 1.5rem;
        }
        .input {
            border-radius: 4px;
            border: 1px solid #ccc;
            padding: 0.75rem;
            width: 100%;
            box-sizing: border-box;
        }
        .button.is-primary {
            background-color: #3273dc;
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }
        .button.is-primary:hover {
            background-color: #276fa3;
        }
        footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #555;
        }
        footer a {
            color: #3273dc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        {{ if .BrandName }}
            <h1>{{ .BrandName }}</h1>
        {{ end }}
        {{ if .Logo }}
            <div class="logo">
                {{.Logo}} 
            </div>
        {{ end }}
        <form action="/sign_in" method="post">
            <div class="field">
                <label class="label has-text-weight-bold">Username</label>
                <div class="control">
                    <input class="input" type="text" name="username" placeholder="Username" required>
                </div>
            </div>
            <div class="field">
                <label class="label has-text-weight-bold">Password</label>
                <div class="control">
                    <input class="input" type="password" name="password" placeholder="Password" required>
                </div>
            </div>

            {{if .ErrorMessage}}
                <div class="field" style="color: red; margin-bottom: 1rem;">
                    {{.ErrorMessage}}
                </div>
            {{end}}

            <div class="field">
                <div class="control">
                    <button class="button is-primary" type="submit">Sign In</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        if (window.location.hash) {
            (function() {
                var inputs = document.getElementsByName('rd');
                for (var i = 0; i < inputs.length; i++) {
                    var idx = inputs[i].value.indexOf('#');
                    if (idx >= 0) {
                        inputs[i].value = inputs[i].value.substr(0, idx);
                    }
                    inputs[i].value += window.location.hash;
                }
            })();
        }
    </script>
</body>
</html>
